name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build:prod

      - name: Deploy to dist branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          cp dist/main.user.js /tmp/main.user.js
          git fetch origin dist || true
          git checkout dist || git checkout --orphan dist
          cp /tmp/main.user.js .
          git add main.user.js
          git diff --cached --quiet || git commit -m "build: update main.user.js from ${{ github.sha }}"
          git push origin dist


