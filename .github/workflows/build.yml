name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build:prod

      - name: Deploy to output branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Save the built file
          cp dist/main.user.js /tmp/main.user.js
          
          # Try to checkout output branch, create if doesn't exist
          git fetch origin output 2>/dev/null || true
          if git rev-parse --verify origin/output >/dev/null 2>&1; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf --cached . 2>/dev/null || true
            git clean -fd 2>/dev/null || true
          fi
          
          # Clean and add only the build file
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true
          cp /tmp/main.user.js .
          git add -A
          git diff --cached --quiet || git commit -m "build: ${{ github.sha }}"
          git push origin output
